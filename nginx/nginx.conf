# ============================================================
# Nginx — Vigil Production (HTTPS / Let's Encrypt)
# ============================================================
# Domains:
#   vigil.projet-cyna.fr        -> Streamlit dashboard (vigil_streamlit:8501)
#   vigil.projet-cyna.fr/api    -> FastAPI backend     (vigil_backend:8000)
#   vigil.projet-cyna.fr/n8n    -> n8n                 (vigil_n8n:5678)
#
# Certificate:
#   /etc/letsencrypt/live/vigil.projet-cyna.fr/
#
# Before starting: create the cert on the host:
#   certbot certonly --standalone -d vigil.projet-cyna.fr
#   (stop nginx first if port 80 is busy)
# ============================================================

events { worker_connections 1024; }

http {

    # ── HTTP -> HTTPS redirect ────────────────────────────────────────
    server {
        listen 80;
        server_name vigil.projet-cyna.fr;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name vigil.projet-cyna.fr;

        ssl_certificate     /etc/letsencrypt/live/vigil.projet-cyna.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vigil.projet-cyna.fr/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── FastAPI (/api) ────────────────────────────────────────────
        location /api {
            proxy_pass http://vigil_backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── n8n (/n8n) ───────────────────────────────────────────────
        location /n8n {
            proxy_pass http://vigil_n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Streamlit (/) ─────────────────────────────────────────────
        # Must be last — catches everything else
        location / {
            proxy_pass http://vigil_streamlit:8501;
            proxy_http_version 1.1;
            # Streamlit requires WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}